<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="appName">X Search Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app">
    <!-- ヘッダー -->
    <header class="header">
      <div class="header-title">
        <svg class="logo" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor"
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
        </svg>
        <h1 data-i18n="headerTitle">Search Helper</h1>
      </div>
      <div class="header-actions">
        <!-- 言語切替ボタン -->
        <button id="langToggle" class="icon-btn text-btn" title="言語切替 / Language">
          <span id="currentLangLabel">JA</span>
        </button>
        <!-- テーマ切替ボタン -->
        <button id="themeToggle" class="icon-btn" data-i18n-title="themeToggleTitle" title="テーマ切替">
          <svg class="theme-icon-dark" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor"
              d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
          </svg>
          <svg class="theme-icon-light" viewBox="0 0 24 24" width="16" height="16" style="display:none;">
            <path fill="currentColor"
              d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
          </svg>
        </button>
        <!-- リセットボタン -->
        <button id="resetBtn" class="icon-btn" data-i18n-title="resetBtnTitle" title="リセット">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor"
              d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- クエリプレビュー -->
    <div class="preview-section">
      <div class="preview-label" data-i18n="queryPreviewLabel">構築クエリ</div>
      <div id="queryPreview" class="query-preview" data-i18n="queryPreviewDefault">検索オプションを入力してください...</div>
    </div>

    <!-- 検索ボタン -->
    <div class="search-actions">
      <button id="searchBtn" class="search-btn" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor"
            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
        </svg>
        <span data-i18n="searchBtn">Xで検索</span>
      </button>
      <button id="copyBtn" class="copy-btn" disabled data-i18n-title="copyBtnTitle" title="クエリをコピー">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor"
            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
        </svg>
      </button>
    </div>



    <!-- カテゴリ別アコーディオン -->
    <div class="categories">

      <!-- 1. キーワード -->
      <div class="category" data-category="keywords">
        <button class="category-header">
          <span class="category-icon">🔤</span>
          <span class="category-title" data-i18n="catKeywords">キーワード・フレーズ</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="field-group">
            <label>
              <span data-i18n="lblKeywords">キーワード</span> <span class="hint"
                data-i18n="hintKeywordsAND">スペース区切りでAND検索</span>
              <button class="help-btn" data-help="keywords">?</button>
            </label>
            <input type="text" id="keywords" data-i18n-placeholder="plhKeywords" placeholder="例: プログラミング AI">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblExactMatch">完全一致フレーズ</span>
              <button class="help-btn" data-help="exact">?</button>
            </label>
            <input type="text" id="exactPhrase" data-i18n-placeholder="plhExactMatch" placeholder="例: 機械学習 入門">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblOR">OR検索</span> <span class="hint" data-i18n="hintOR">いずれかを含む</span>
              <button class="help-btn" data-help="or">?</button>
            </label>
            <input type="text" id="orKeywords" data-i18n-placeholder="plhOR" placeholder="例: Python,JavaScript（カンマ区切り）">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblExclude">除外キーワード</span>
              <button class="help-btn" data-help="exclude">?</button>
            </label>
            <input type="text" id="excludeKeywords" data-i18n-placeholder="plhExclude" placeholder="例: 広告,PR（カンマ区切り）">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblHashtag">ハッシュタグ</span>
              <button class="help-btn" data-help="hashtag">?</button>
            </label>
            <input type="text" id="hashtag" data-i18n-placeholder="plhHashtag" placeholder="例: AI（#不要）">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblCashtag">キャッシュタグ</span> <span class="hint" data-i18n="hintCashtag">株式ティッカーなど</span>
              <button class="help-btn" data-help="cashtag">?</button>
            </label>
            <input type="text" id="cashtag" data-i18n-placeholder="plhCashtag" placeholder="例: TSLA（$不要）">
          </div>
        </div>
      </div>

      <!-- 2. ユーザー -->
      <div class="category" data-category="users">
        <button class="category-header">
          <span class="category-icon">👤</span>
          <span class="category-title" data-i18n="catUsers">ユーザー指定</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="field-group">
            <label>
              <span data-i18n="lblFrom">投稿者</span> <span class="hint">from:</span>
              <button class="help-btn" data-help="from">?</button>
            </label>
            <input type="text" id="fromUser" data-i18n-placeholder="plhFrom" placeholder="例: elonmusk（@不要）">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblTo">宛先</span> <span class="hint">to:</span>
              <button class="help-btn" data-help="to">?</button>
            </label>
            <input type="text" id="toUser" data-i18n-placeholder="plhTo" placeholder="例: elonmusk（@不要）">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblMention">メンション</span> <span class="hint">@</span>
              <button class="help-btn" data-help="mention">?</button>
            </label>
            <input type="text" id="mentionUser" data-i18n-placeholder="plhMention" placeholder="例: NASA（@不要）">
          </div>
          <div class="toggle-group" style="grid-template-columns: 1fr;">
            <label class="toggle-item">
              <input type="checkbox" id="filterFollows">
              <span class="toggle-label" data-i18n="lblFilterFollows">👥 フォロー中のみ</span>
              <button class="help-btn" data-help="follows">?</button>
            </label>
          </div>
        </div>
      </div>

      <!-- 3. コンテンツフィルター -->
      <div class="category" data-category="filters">
        <button class="category-header">
          <span class="category-icon">🔍</span>
          <span class="category-title" data-i18n="catFilters">コンテンツフィルター</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="toggle-group">
            <label class="toggle-item">
              <input type="checkbox" id="filterImages">
              <span class="toggle-label" data-i18n="lblFilterImages">🖼️ 画像を含む</span>
              <button class="help-btn" data-help="filterImages">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="filterVideos">
              <span class="toggle-label" data-i18n="lblFilterVideos">🎬 動画を含む</span>
              <button class="help-btn" data-help="filterVideos">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="filterMedia">
              <span class="toggle-label" data-i18n="lblFilterMedia">📎 メディア全般</span>
              <button class="help-btn" data-help="filterMedia">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="filterLinks">
              <span class="toggle-label" data-i18n="lblFilterLinks">🔗 リンクを含む</span>
              <button class="help-btn" data-help="filterLinks">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="filterVerified">
              <span class="toggle-label" data-i18n="lblFilterVerified">✅ 認証済みのみ</span>
              <button class="help-btn" data-help="filterVerified">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="excludeReplies">
              <span class="toggle-label" data-i18n="lblExcludeReplies">💬 リプライ除外</span>
              <button class="help-btn" data-help="excludeReplies">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="excludeRetweets">
              <span class="toggle-label" data-i18n="lblExcludeRetweets">🔄 リツイート除外</span>
              <button class="help-btn" data-help="excludeRetweets">?</button>
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="filterQuote">
              <span class="toggle-label" data-i18n="lblFilterQuote">💭 引用のみ</span>
              <button class="help-btn" data-help="filterQuote">?</button>
            </label>
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblUrl">URL指定</span> <span class="hint">url:</span>
              <button class="help-btn" data-help="url">?</button>
            </label>
            <input type="text" id="urlFilter" data-i18n-placeholder="plhUrl" placeholder="例: example.com">
          </div>
        </div>
      </div>

      <!-- 4. 日付指定 -->
      <div class="category" data-category="dates">
        <button class="category-header">
          <span class="category-icon">📅</span>
          <span class="category-title" data-i18n="catDates">日付指定</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="field-group">
            <label>
              <span data-i18n="lblSince">開始日</span> <span class="hint">since:</span>
              <button class="help-btn" data-help="since">?</button>
            </label>
            <input type="date" id="sinceDate">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblUntil">終了日</span> <span class="hint">until:</span>
              <button class="help-btn" data-help="until">?</button>
            </label>
            <input type="date" id="untilDate">
          </div>
        </div>
      </div>

      <!-- 5. エンゲージメント -->
      <div class="category" data-category="engagement">
        <button class="category-header">
          <span class="category-icon">📊</span>
          <span class="category-title" data-i18n="catEngagement">エンゲージメント</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="field-group">
            <label>
              <span data-i18n="lblMinFaves">最小いいね数</span> <span class="hint">min_faves:</span>
              <button class="help-btn" data-help="minFaves">?</button>
            </label>
            <input type="number" id="minFaves" min="0" data-i18n-placeholder="plhMinFaves" default="例: 100">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblMinRetweets">最小リツイート数</span> <span class="hint">min_retweets:</span>
              <button class="help-btn" data-help="minRetweets">?</button>
            </label>
            <input type="number" id="minRetweets" min="0" data-i18n-placeholder="plhMinRetweets" placeholder="例: 50">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblMinReplies">最小リプライ数</span> <span class="hint">min_replies:</span>
              <button class="help-btn" data-help="minReplies">?</button>
            </label>
            <input type="number" id="minReplies" min="0" data-i18n-placeholder="plhMinReplies" placeholder="例: 10">
          </div>
        </div>
      </div>

      <!-- 6. 言語・位置情報 -->
      <div class="category" data-category="locale">
        <button class="category-header">
          <span class="category-icon">🌐</span>
          <span class="category-title" data-i18n="catLocale">言語・位置情報</span>
          <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
          </svg>
        </button>
        <div class="category-content">
          <div class="field-group">
            <label>
              <span data-i18n="lblLang">言語</span> <span class="hint">lang:</span>
              <button class="help-btn" data-help="lang">?</button>
            </label>
            <select id="langFilter">
              <option value="" data-i18n="optLangAny">指定なし</option>
              <option value="ja">日本語 (ja)</option>
              <option value="en">English (en)</option>
              <option value="es">Español (es)</option>
              <option value="fr">Français (fr)</option>
              <option value="de">Deutsch (de)</option>
              <option value="it">Italiano (it)</option>
              <option value="pt">Português (pt)</option>
              <option value="ko">한국어 (ko)</option>
              <option value="zh">中文 (zh)</option>
              <option value="ar">العربية (ar)</option>
              <option value="ru">Русский (ru)</option>
              <option value="hi">हिन्दी (hi)</option>
            </select>
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblNear">場所付近</span> <span class="hint">near:</span>
              <button class="help-btn" data-help="near">?</button>
            </label>
            <input type="text" id="nearCity" data-i18n-placeholder="plhNear" placeholder="例: Tokyo">
          </div>
          <div class="field-group">
            <label>
              <span data-i18n="lblWithin">範囲</span> <span class="hint">within:</span>
              <button class="help-btn" data-help="within">?</button>
            </label>
            <input type="text" id="withinDistance" data-i18n-placeholder="plhWithin" placeholder="例: 10km">
          </div>
        </div>
      </div>

    </div>

    <!-- 拡張機能設定 -->
    <div class="settings-section">
      <div class="settings-header">
        <span class="category-icon">⚙️</span>
        <span class="settings-title" data-i18n="settingsTitle">拡張機能設定</span>
      </div>
      <div class="settings-content">
        <label class="setting-item" for="showFollowButton">
          <div class="setting-info">
            <span class="setting-label" data-i18n="settingFollowBtn">➕ フォローボタンを常時表示</span>
            <span class="setting-desc" data-i18n="settingFollowBtnDesc">タイムラインのポストにフォローボタンを表示します</span>
          </div>
          <div class="switch-wrapper">
            <input type="checkbox" id="showFollowButton" class="switch-input">
            <span class="switch-slider"></span>
          </div>
        </label>

        <!-- 背景画像カスタマイズ -->
        <div class="bg-image-section">
          <label class="setting-item" for="enableBgImage">
            <div class="setting-info">
              <span class="setting-label" data-i18n="settingBgImage">🖼️ 背景画像カスタマイズ</span>
              <span class="setting-desc" data-i18n="settingBgImageDesc">Xの背景に好きな画像を表示します</span>
            </div>
            <div class="switch-wrapper">
              <input type="checkbox" id="enableBgImage" class="switch-input">
              <span class="switch-slider"></span>
            </div>
          </label>

          <div id="bgImageControls" class="bg-image-controls" style="display:none;">
            <!-- 画像選択 -->
            <div class="bg-image-picker">
              <div id="bgImagePreview" class="bg-image-preview">
                <span class="bg-image-placeholder" data-i18n="bgImageNoImage">画像が選択されていません</span>
              </div>
              <div class="bg-image-actions">
                <label class="bg-image-browse-btn" for="bgImageFile">
                  <span data-i18n="bgImageBrowse">📂 画像を選択</span>
                  <input type="file" id="bgImageFile" accept="image/*" style="display:none;">
                </label>
                <button id="bgImageClear" class="bg-image-clear-btn" data-i18n="bgImageClear">🗑️ 画像を削除</button>
              </div>
            </div>

            <!-- 透過率スライダー -->
            <div class="bg-slider-group">
              <label class="bg-slider-label">
                <span data-i18n="bgImageOpacity">透過率</span>
                <span id="bgOpacityValue" class="bg-slider-value">30%</span>
              </label>
              <input type="range" id="bgOpacity" class="bg-slider" min="0" max="100" value="30">
            </div>

            <!-- ぼかしスライダー -->
            <div class="bg-slider-group">
              <label class="bg-slider-label">
                <span data-i18n="bgImageBlur">ぼかし</span>
                <span id="bgBlurValue" class="bg-slider-value">0px</span>
              </label>
              <input type="range" id="bgBlur" class="bg-slider" min="0" max="20" value="0">
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ヘルプポップオーバー -->
    <div id="helpPopover" class="help-popover" style="display:none;">
      <div class="help-popover-header">
        <span id="helpTitle" class="help-title"></span>
        <button id="helpClose" class="help-close">&times;</button>
      </div>
      <div id="helpBody" class="help-body"></div>
    </div>
    <div id="helpOverlay" class="help-overlay" style="display:none;"></div>

    <!-- フッター -->
    <footer class="footer">
      <a href="https://ko-fi.com/neco75" target="_blank" class="donate-btn" data-i18n="donateBtn">☕ 応援する</a>
      <span>X Search Helper v1.5</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
